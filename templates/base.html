<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}AI Resume Screener{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Plotly for charts (latest stable) -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <!-- Main CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-dark text-white">
    <!-- Fixed navbar with 3D branding -->
    <nav class="navbar navbar-expand-lg fixed-top navbar-dark bg-dark border-bottom border-primary">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="{{ url_for('index') }}">
                <i class="fas fa-brain me-2 text-primary"></i>AI Resume Screener
            </a>
            
            <div class="ms-auto d-flex align-items-center">
                <!-- Candidate feedback link (always visible) -->
                <a href="{{ url_for('candidate') }}" class="btn btn-outline-primary btn-sm me-2">
                    <i class="fas fa-user-graduate me-1"></i>Candidate
                </a>
                
                {% if session.get('user') %}
                    <span class="me-3 text-white-50 small">
                        {{ session.get('user') }} ({{ session.get('role') }})
                    </span>
                    <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">
                        <i class="fas fa-sign-out-alt me-1"></i>Logout
                    </a>
                {% else %}
                    <a href="{{ url_for('login') }}" class="btn btn-outline-light btn-sm">
                        <i class="fas fa-sign-in-alt me-1"></i>HR Login
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Main content with top padding for fixed navbar -->
    <div class="pt-5">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Three.js for 3D background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
            integrity="sha512-pvF8Ww1+RZFwVnqGcm87G1xv8TlnKqSZ0XvP2qoXyujWHz5T4XxR0y1Qb4+JrQozkG6lJ5aPXlOPAW5vfeL4WQ=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- App logic (page-specific) -->
    {% block extra_js %}{% endblock %}
</body>
</html>
