{% extends "base.html" %}
{% block title %}HR Resume Screening{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/app.js') }}"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const batchSwitch = document.getElementById("batchModeSwitch");
    const compareSwitch = document.getElementById("compareModeSwitch");
    const jdSwitch = document.getElementById("jdModeSwitch");

    const singleInputBlock = document.getElementById("singleResumeInput");
    const compareInputBlock = document.getElementById("compareResumeInput");
    const batchInputBlock = document.getElementById("batchResumeInput");
    const jdBlock = document.getElementById("jdInput");

    const singleInput = document.querySelector("input[name='resume']");
    const resume1Input = document.querySelector("input[name='resume1']");
    const resume2Input = document.querySelector("input[name='resume2']");
    const batchInput = document.querySelector("input[name='resumes']");
    const submitText = document.getElementById("submitText");

    function updateMode() {
        const batchOn = batchSwitch.checked;
        const compareOn = compareSwitch.checked;

        // Ensure only one of batch / compare is active
        if (batchOn && compareOn) {
            // If user turns one on while the other is already on, turn off the other
            if (this === batchSwitch) {
                compareSwitch.checked = false;
            } else if (this === compareSwitch) {
                batchSwitch.checked = false;
            }
        }

        const effectiveBatch = batchSwitch.checked;
        const effectiveCompare = compareSwitch.checked;

        // Reset required flags
        singleInput.required = false;
        if (resume1Input) resume1Input.required = false;
        if (resume2Input) resume2Input.required = false;
        if (batchInput) batchInput.required = false;

        // Single mode (default)
        if (!effectiveBatch && !effectiveCompare) {
            singleInputBlock.classList.remove("d-none");
            compareInputBlock.classList.add("d-none");
            batchInputBlock.classList.add("d-none");
            singleInput.required = true;
            submitText.textContent = "Analyze Resume";
        }

        // Batch mode
        if (effectiveBatch && !effectiveCompare) {
            singleInputBlock.classList.add("d-none");
            compareInputBlock.classList.add("d-none");
            batchInputBlock.classList.remove("d-none");
            batchInput.required = true;
            submitText.textContent = "Analyze Batch";
        }

        // Compare mode
        if (effectiveCompare && !effectiveBatch) {
            singleInputBlock.classList.add("d-none");
            compareInputBlock.classList.remove("d-none");
            batchInputBlock.classList.add("d-none");
            if (resume1Input) resume1Input.required = true;
            if (resume2Input) resume2Input.required = true;
            submitText.textContent = "Compare Candidates";
        }
    }

    function updateJD() {
        if (jdSwitch.checked) {
            jdBlock.classList.remove("d-none");
        } else {
            jdBlock.classList.add("d-none");
        }
    }

    batchSwitch.addEventListener("change", updateMode);
    compareSwitch.addEventListener("change", updateMode);
    jdSwitch.addEventListener("change", updateJD);

    updateMode();
    updateJD();
});
</script>
{% endblock %}

{% block content %}

<div id="three-canvas"></div>

<div class="container-fluid mt-5">
    <div class="row justify-content-center">
        <!-- Upload panel -->
        <div class="col-lg-4 mb-4">
            <div class="card glass-card shadow-lg p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-file-upload fa-4x text-primary mb-3"></i>
                    <h2 class="fw-bold text-white">HR Resume Screening</h2>
                    <p class="text-white-50 small mb-0">
                        <span class="badge bg-primary">Single</span> 
                        <span class="badge bg-success">Batch</span> 
                        <span class="badge bg-warning">Compare</span>
                        <span class="badge bg-info text-white">JD Match</span>
                    </p>
                </div>

                <form id="uploadForm"
                      action="{{ url_for('analyze') }}"
                      method="post"
                      enctype="multipart/form-data">
                    <!-- Batch toggle -->
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="batchModeSwitch" name="batch_mode">
                        <label class="form-check-label text-white" for="batchModeSwitch">
                            <i class="fas fa-layer-group me-1"></i>Batch (up to 10)
                        </label>
                    </div>

                    <!-- Compare toggle -->
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="compareModeSwitch" name="compare_mode">
                        <label class="form-check-label text-white" for="compareModeSwitch">
                            <i class="fas fa-balance-scale me-1"></i>Compare (2 resumes)
                        </label>
                    </div>

                    <!-- JD Matching toggle -->
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="jdModeSwitch" name="jd_mode">
                        <label class="form-check-label text-white" for="jdModeSwitch">
                            <i class="fas fa-briefcase me-1"></i>Job Description Match
                        </label>
                    </div>

                    <!-- Job Role -->
                    <div class="mb-3">
                        <label class="form-label text-white fw-bold">Job Role</label>
                        <select class="form-select bg-transparent text-white" name="job_category" required>
                            <option value="">Select Job Role</option>
                            <option value="data_science">Data Scientist</option>
                            <option value="software_engineer">Software Engineer</option>
                            <option value="product_manager">Product Manager</option>
                        </select>
                    </div>

                    <!-- JD textarea -->
                    <div id="jdInput" class="mb-3 d-none">
                        <label class="form-label text-white fw-bold">Job Description</label>
                        <textarea class="form-control bg-transparent text-white border-white" 
                                  name="job_description" rows="4"
                                  placeholder="Paste the full job description here..."></textarea>
                        <div class="form-text text-white-50 small">
                            Custom JD for precise matching (optional but powerful).
                        </div>
                    </div>

                    <!-- Single resume -->
                    <div id="singleResumeInput" class="mb-3">
                        <label class="form-label text-white fw-bold">Resume File</label>
                        <input type="file" class="form-control bg-transparent text-white border-white"
                               name="resume" accept=".pdf,.docx" required>
                    </div>

                    <!-- Compare inputs -->
                    <div id="compareResumeInput" class="mb-3 d-none">
                        <div class="row">
                            <div class="col-6">
                                <label class="form-label text-white fw-bold small">Resume 1</label>
                                <input type="file" class="form-control bg-transparent text-white border-white"
                                       name="resume1" accept=".pdf,.docx">
                            </div>
                            <div class="col-6">
                                <label class="form-label text-white fw-bold small">Resume 2</label>
                                <input type="file" class="form-control bg-transparent text-white border-white"
                                       name="resume2" accept=".pdf,.docx">
                            </div>
                        </div>
                    </div>

                    <!-- Batch input -->
                    <div id="batchResumeInput" class="mb-3 d-none">
                        <label class="form-label text-white fw-bold">Multiple Resumes</label>
                        <input type="file" class="form-control bg-transparent text-white border-white"
                               name="resumes" accept=".pdf,.docx" multiple>
                        <div id="batchFileList" class="mt-2 text-white-50 small"></div>
                    </div>

                    <!-- Blind screening -->
                    <div class="form-check form-switch mb-4">
                        <input class="form-check-input" type="checkbox" id="blindModeSwitch" name="blind_mode">
                        <label class="form-check-label text-white-50 small" for="blindModeSwitch">
                            Blind screening (hide personal info)
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        <i class="fas fa-rocket me-2"></i>
                        <span id="submitText">Analyze Resume</span>
                    </button>
                </form>
            </div>
        </div>

        <!-- Results panel -->
        <div class="col-lg-8">
            <div id="loading" class="d-none text-center p-5">
                <div class="spinner-border text-primary mb-3" role="status" style="width: 4rem; height: 4rem;"></div>
                <h4 class="text-white" id="loadingText">Analyzing...</h4>
                <div class="progress mt-3" style="height: 8px;">
                    <div class="progress-bar progress-bar-striped progress-bar-animated bg-primary" 
                         role="progressbar" style="width: 0%"></div>
                </div>
            </div>

            <div id="resultsContainer"></div>
        </div>
    </div>
</div>

{% endblock %}
